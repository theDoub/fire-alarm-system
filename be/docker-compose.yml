services:
  db:
    image: postgres:15-alpine
    container_name: fire_alarm_db
    environment:
      POSTGRES_USER: ${DB_USER:-firealert_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-firealert}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: eclipse-temurin:17-jre
    container_name: fire_alarm_api
    working_dir: /app
    command: java -jar target/fire-alert-backend-1.0.0.jar
    environment:
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /api
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-firealert}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-firealert_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_FILE_NAME: /app/logs/application.log
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
