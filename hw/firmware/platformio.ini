[env:esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_speed = 921600
monitor_speed = 115200

; Libraries
lib_deps =
    Wire
    SPI
    WiFi
    AsyncTCP
    ESPAsyncWebServer
    PubSubClient
    ArduinoJson
    OneWire
    DallasTemperature
    Adafruit_Sensor
    Adafruit_MQ135
    Preferences

; Build options
build_flags =
    -D DEBUG=1
    -D DEVICE_NAME="FireAlarm_001"
    -D MQTT_BROKER="192.168.1.100"
    -D MQTT_PORT=1883
    -D WIFI_SSID="YourSSID"
    -D WIFI_PASSWORD="YourPassword"

; Monitor options
monitor_filters =
    time
    log2file
